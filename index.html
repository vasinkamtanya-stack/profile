<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - วศิน คําธัญญา</title>
    <style>
        /* นำเข้าฟอนต์ Prompt จาก Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            /* ปรับตำแหน่งแกน Y เป็น 12% เพื่อให้โฟกัสที่ใบหน้าจากภาพ pic line.jpg */
            object-position: center 12%; 
            border: 5px solid #4a90e2;
            padding: 3px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 5px;
        }

        .student-id {
            font-size: 16px;
            font-weight: 400;
            color: #4a90e2;
            background-color: #f0f7ff;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .details-container {
            text-align: left;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }

        .detail-item {
            margin-bottom: 12px;
            font-size: 15px;
            color: #555555;
            display: flex;
            align-items: baseline;
        }

        .detail-label {
            font-weight: 500;
            color: #333333;
            min-width: 90px;
            margin-right: 10px;
        }

        a {
            color: #4a90e2;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #357abd;
            text-decoration: underline;
        }

        .university-badge {
            margin-top: 25px;
            font-size: 14px;
            color: #777777;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <!-- ดึงไฟล์ภาพ pic line.jpg มาแสดงผลโดยตรง -->
        <img src="pic line.jpg" alt="รูปโปรไฟล์ วศิน คําธัญญา" class="profile-img">
        
        <!-- ชื่อและรหัสนักศึกษา -->
        <h1 class="name">วศิน คําธัญญา</h1>
        <div class="student-id">รหัส: 694245009</div>

        <!-- รายละเอียดอื่นๆ -->
        <div class="details-container">
            <div class="detail-item">
                <span class="detail-label">เบอร์โทรศัพท์:</span> 
                <span>061 953 2991</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">อีเมล:</span> 
                <a href="mailto:694245009@mcru.ac.th">694245009@mcru.ac.th</a>
            </div>
            <div class="detail-item">
                <span class="detail-label">สาขาวิชา:</span> 
                <span>วิทยาการคอมพิวเตอร์</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">คณะ:</span> 
                <span>วิทยาศาสตร์และเทคโนโลยี</span>
            </div>
        </div>

        <div class="university-badge">
            มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง
        </div>
    </div>

</body>
</html>
